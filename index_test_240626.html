<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyradar (Flettet GitHub-versjon)</title>
    <style>
        body {
            font-family: monospace, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 10px;
            margin: 0;
        }
        h2 {
            margin-bottom: 5px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
            font-size: 1.2rem;
            margin-top: 15px;
        }
        .meta {
            font-size: 0.8rem;
            margin-top: 25px;
            border-top: 1px dashed #000000;
            padding-top: 10px;
            line-height: 1.4;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        th, td {
            border-bottom: 1px solid #000000;
            text-align: left;
            padding: 6px 4px;
            font-size: 0.9rem;
        }
        th {
            font-weight: bold;
        }
        .loading {
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .status-landet {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button onclick="nullstillOgHent()">OPPDATER NÅ</button>

    <h2>GARDERMOEN (OSL)</h2>
    <div id="statusOsl" class="loading">Henter ferske data...</div>
    <table id="tabellOsl" style="display:none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Status / Info</th>
                <th>Detaljer</th>
            </tr>
        </thead>
        <tbody id="dataOsl"></tbody>
    </table>

    <h2>TROMSØ (TOS)</h2>
    <div id="statusTos" class="loading">Henter ferske data...</div>
    <table id="tabellTos" style="display:none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Status / Info</th>
                <th>Detaljer</th>
            </tr>
        </thead>
        <tbody id="dataTos"></tbody>
    </table>

    <div class="meta">
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske oppdatering om: <span id="teller">30</span>s
    </div>

    <script>
        var flyplasser = {
            osl: {
                kode: "OSL",
                lat: 60.197,
                lon: 11.096,
                url: "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=60.480,59.910,10.510,11.680%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=0%26air=1%26vehicles=0%26estimated=1",
                avinorRawUrl: "https://data.avinor.no/flightdata/v1/airport/OSL/arrivals?TimeWindow=1",
                statusElId: "statusOsl",
                tabellId: "tabellOsl",
                dataElId: "dataOsl",
                flyIlufta: [],
                flyLandet: [],
                frFerdig: false,
                avinorFerdig: false
            },
            tos: {
                kode: "TOS",
                lat: 69.683,
                lon: 18.919,
                url: "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=69.960,69.400,18.150,19.680%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=0%26air=1%26vehicles=0%26estimated=1",
                avinorRawUrl: "https://data.avinor.no/flightdata/v1/airport/TOS/arrivals?TimeWindow=1",
                statusElId: "statusTos",
                tabellId: "tabellTos",
                dataElId: "dataTos",
                flyIlufta: [],
                flyLandet: [],
                frFerdig: false,
                avinorFerdig: false
            }
        };
                
        var oppdateringsFrekvensSekunder = 30;
        var sekunderIgjen = oppdateringsFrekvensSekunder;

        function kalkulerAvstand(lat1, lon1, lat2, lon2) {
            var x = (lon2 - lon1) * Math.cos((lat1 + lat2) / 2 * Math.PI / 180) * 111.32;
            var y = (lat2 - lat1) * 111.13;
            return Math.sqrt(x * x + y * y);
        }

        function hentRetningsPil(grader) {
            if (grader === undefined || grader === null) return "?";
            var g = grader % 360;
            if (g >= 337.5 || g < 22.5)  return "&#8593;";
            if (g >= 22.5  && g < 67.5)  return "&#8599;";
            if (g >= 67.5  && g < 112.5) return "&#8594;";
            if (g >= 112.5 && g < 157.5) return "&#8600;";
            if (g >= 157.5 && g < 202.5) return "&#8595;";
            if (g >= 202.5 && g < 247.5) return "&#8601;";
            if (g >= 247.5 && g < 292.5) return "&#8592;";
            if (g >= 292.5 && g < 337.5) return "&#8598;";
            return "?";
        }

        function hentDataForFlyplass(id) {
            var fp = flyplasser[id];
            fp.flyIlufta = [];
            fp.flyLandet = [];
            fp.frFerdig = false;
            fp.avinorFerdig = false;

            document.getElementById(fp.statusElId).style.display = "block";
            document.getElementById(fp.statusElId).innerText = "Henter ferske data...";
            document.getElementById(fp.tabellId).style.display = "none";
            document.getElementById(fp.dataElId).innerHTML = "";

            hentFlightradarData(id);
            hentAvinorData(id);
        }

        function sjekkOmFerdigOgBygg(id) {
            var fp = flyplasser[id];
            if (!fp.frFerdig || !fp.avinorFerdig) return; // Vent til begge kilder har svart

            var dataBoks = document.getElementById(fp.dataElId);
            var tabellEl = document.getElementById(fp.tabellId);
            var statusEl = document.getElementById(fp.statusElId);

            var htmlInnhold = "";

            // 1. Legg til fly i lufta (Maks 5, sortert etter avstand)
            if (fp.flyIlufta.length > 0) {
                fp.flyIlufta.sort(function (a, b) { return a.avstand - b.avstand; });
                var maksFemLufta = fp.flyIlufta.slice(0, 5);
                
                for (var i = 0; i < maksFemLufta.length; i++) {
                    var f = maksFemLufta[i];
                    var pil = hentRetningsPil(f.retning);
                    htmlInnhold += "<tr>" +
                                   "<td><strong>" + f.rute + "</strong><br><small>" + f.type + "</small></td>" +
                                   "<td>" + f.fra + " -> " + f.til + "</td>" +
                                   "<td>I LUFTA<br><small>" + f.høyde + " / " + f.fart + "</small></td>" +
                                   "<td><span style='font-size:1.1rem; font-weight:bold;'>" + pil + "</span> " + f.avstand.toFixed(1) + " km</td>" +
                                   "</tr>";
                }
            }

            // 2. Legg til nylig landede fly fra Avinor (Landet siste 15 min)
            if (fp.flyLandet.length > 0) {
                for (var j = 0; j < fp.flyLandet.length; j++) {
                    var l = fp.flyLandet[j];
                    htmlInnhold += "<tr>" +
                                   "<td><strong>" + l.rute + "</strong><br><small>✓ LANDET</small></td>" +
                                   "<td>" + l.fra + " -> " + fp.kode + "</td>" +
                                   "<td class='status-landet'>" + l.tidTekst + "</td>" +
                                   "<td><strong>Gate: " + l.gate + "</strong></td>" +
                                   "</tr>";
                }
            }

            if (htmlInnhold !== "") {
                dataBoks.innerHTML = htmlInnhold;
                statusEl.style.display = "none";
                tabellEl.style.display = "table";
            } else {
                statusEl.innerText = "Ingen aktive eller nylig landede fly funnet.";
            }
        }

        function hentAvinorData(id) {
            var fp = flyplasser[id];
            var script = document.createElement('script');
            var callbackNavn = 'callback_avinor_' + id + '_' + new Date().getTime() + Math.floor(Math.random() * 1000);
            
            window[callbackNavn] = function(data) {
                try {
                    var parser = new DOMParser();
                    var xmlDoc = parser.parseFromString(data.contents, "text/xml");
                    var flights = xmlDoc.getElementsByTagName("flight");
                    var nåTid = new Date().getTime();

                    for (var i = 0; i < flights.length; i++) {
                        var statusElXml = flights[i].getElementsByTagName("status")[0];
                        
                        if (statusElXml && statusElXml.getAttribute("code") === "A") {
                            var actualTimeStr = flights[i].getElementsByTagName("actualTime")[0];
                            if (actualTimeStr) {
                                var landetTidspunkt = new Date(actualTimeStr.textContent || actualTimeStr.innerText).getTime();
                                var tidsDiffMinutter = (nåTid - landetTidspunkt) / 1000 / 60;

                                if (tidsDiffMinutter >= 0 && tidsDiffMinutter <= 15) {
                                    var fId = flights[i].getElementsByTagName("flight_id")[0];
                                    var airportEl = flights[i].getElementsByTagName("airport")[0];
                                    var gateEl = flights[i].getElementsByTagName("gate")[0];

                                    fp.flyLandet.push({
                                        rute: fId ? (fId.textContent || fId.innerText) : "Ukjent",
                                        fra: airportEl ? (airportEl.textContent || airportEl.innerText) : "???",
                                        gate: gateEl ? (gateEl.textContent || gateEl.innerText) : "-",
                                        tidTekst: Math.floor(tidsDiffMinutter) + "m siden"
                                    });
                                }
                            }
                        }
                    }
                } catch(e) {
                    console.error("Feil ved tolking av Avinor-XML: ", e);
                }
                
                fp.avinorFerdig = true;
                sjekkOmFerdigOgBygg(id);
                
                delete window[callbackNavn];
                script.parentNode.removeChild(script);
            };

            script.src = "https://api.allorigins.win/get?url=" + encodeURIComponent(fp.avinorRawUrl + "&_cb=" + new Date().getTime()) + "&callback=" + callbackNavn;
            document.body.appendChild(script);
        }

        function hentFlightradarData(id) {
            var fp = flyplasser[id];
            var xhr = new XMLHttpRequest();
            xhr.open("GET", fp.url + "%26_=" + new Date().getTime(), true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);

                            for (var nøkkel in data) {
                                if (data.hasOwnProperty(nøkkel) && nøkkel !== "full_count" && nøkkel !== "version" && nøkkel !== "stats") {
                                    var flyinfo = data[nøkkel];
                                    var altitude = flyinfo[4];
                                    var påBakken = flyinfo[14] === 1;

                                    if (altitude <= 0 || påBakken) continue; 
                                        
                                    var avstandKm = kalkulerAvstand(fp.lat, fp.lon, flyinfo[1], flyinfo[2]);
                                    if (avstandKm > 30.0) continue;

                                    fp.flyIlufta.push({
                                        rute: flyinfo[13] && flyinfo[13] !== "" ? flyinfo[13] : (flyinfo[16] ? flyinfo[16] : "Ukjent"),
                                        type: flyinfo[8] || "Ukjent",
                                        fra: flyinfo[11] || "???",
                                        til: flyinfo[12] || "???",
                                        høyde: altitude + " ft",
                                        fart: flyinfo[5] + " kt",
                                        retning: flyinfo[3],
                                        avstand: avstandKm
                                    });
                                }
                            }
                        } catch (e) {
                            console.error(e);
                        }
                    }
                    fp.frFerdig = true;
                    sjekkOmFerdigOgBygg(id);
                }
            };
            xhr.send();
        }

        function oppdaterAlleFlyplasser() {
            var nå = new Date();
            document.getElementById("time").innerText = nå.toLocaleTimeString("no-NO");
            hentDataForFlyplass("osl");
            hentDataForFlyplass("tos");
        }

        function nullstillOgHent() {
            sekunderIgjen = oppdateringsFrekvensSekunder;
            document.getElementById("teller").innerText = sekunderIgjen;
            oppdaterAlleFlyplasser();
        }

        setInterval(function () {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = oppdateringsFrekvensSekunder;
                oppdaterAlleFlyplasser();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        oppdaterAlleFlyplasser();
    </script>
</body>
</html>
