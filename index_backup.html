<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardermoen (Direkte API)</title>
    <style>
        /* E-ink optimalisert stil: Kun sort/hvitt og høy kontrast */
        body {
            font-family: monospace, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 10px;
            margin: 0;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }
        .meta {
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border-bottom: 1px solid #000000;
            text-align: left;
            padding: 6px 4px;
            font-size: 0.9rem;
        }
        th {
            font-weight: bold;
        }
        .loading {
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>GARDERMOEN (10KM - KUN I LUFTA)</h1>
    <div class="meta">
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske oppdatering om: <span id="teller">30</span>s
    </div>

    <button onclick="nullstillOgHent()">OPPDATER NÅ</button>

    <div id="status" class="loading">Henter ferske flydata...</div>
    
    <table id="flyTabell" style="display: none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Høyde (m)</th>
                <th>Fart (km/t)</th>
                <th>Avstand</th>
            </tr>
        </thead>
        <tbody id="flyData">
        </tbody>
    </table>

    <script>
        // Sentrumskoordinater for Gardermoen terminal
        const mittPunktLat = 60.197;
        const mittPunktLon = 11.096;

        // Stabil, direkte URL som ikke krever proxy overhodet
        const url = "https://opensky-network.org/api/states/all?lamin=60.107&lamax=60.287&lomin=10.916&lomax=11.276";
        
        const oppdateringsFrekvensSekunder = 30;
        let sekunderIgjen = oppdateringsFrekvensSekunder;

        // Enkel funksjon for å regne ut omtrentlig avstand i km
        function kalkulerAvstand(lat1, lon1, lat2, lon2) {
            const x = (lon2 - lon1) * Math.cos((lat1 + lat2) / 2 * Math.PI / 180) * 111.32;
            const y = (lat2 - lat1) * 111.13;
            return Math.sqrt(x * x + y * y);
        }

        async function hentFlydata() {
            const statusEl = document.getElementById("status");
            const tabellEl = document.getElementById("flyTabell");
            const dataBoks = document.getElementById("flyData");
            const tidsEl = document.getElementById("time");

            statusEl.style.display = "block";
            statusEl.innerText = "Henter ferske data...";
            tabellEl.style.display = "none";
            dataBoks.innerHTML = "";

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const nå = new Date();
                tidsEl.innerText = nå.toLocaleTimeString("no-NO");

                if (!data.states || data.states.length === 0) {
                    statusEl.innerText = "Ingen fly i lufta innenfor 10 km akkurat nå.";
                    tabellEl.style.display = "none";
                    return;
                }

                let flyListe = [];

                data.states.forEach(fly => {
                    const flyLat = fly[6];
                    const flyLon = fly[5];
                    const høydeMeter = fly[7];
                    const påBakken = fly[8]; // true eller false

                    // FILTER: Dropp flyet hvis det er markert på bakken, eller mangler koordinater/høyde
                    if (påBakken || flyLat === null || flyLon === null || høydeMeter === null || høydeMeter <= 0) {
                        return; 
                    }
                    
                    const avstandKm = kalkulerAvstand(mittPunktLat, mittPunktLon, flyLat, flyLon);
                    const kallesignal = fly[1] && fly[1].trim() !== "" ? fly[1].trim() : "Ukjent";
                    const fartKmt = fly[9] ? Math.round(fly[9] * 3.6) : 0; // m/s til km/t

                    flyListe.push({
                        rute: kallesignal,
                        høyde: Math.round(høydeMeter) + " m",
                        fart: fartKmt + " km/t",
                        avstand: avstandKm
                    });
                });

                if (flyListe.length === 0) {
                    statusEl.innerText = "Ingen fly i lufta innenfor 10 km akkurat nå.";
                    tabellEl.style.display = "none";
                    return;
                }

                // Sorter listen: Størst avstand (lengst unna) havner øverst
                flyListe.sort((a, b) => b.avstand - a.avstand);

                statusEl.style.display = "none";
                tabellEl.style.display = "table";

                flyListe.forEach(fly => {
                    const rad = document.createElement("tr");
                    rad.innerHTML = `
                        <td><strong>${fly.rute}</strong></td>
                        <td>${fly.høyde}</td>
                        <td>${fly.fart}</td>
                        <td><strong>${fly.avstand.toFixed(1)} km</strong></td>
                    `;
                    dataBoks.appendChild(rad);
                });

            } catch (error) {
                statusEl.innerText = "Nettverksfeil. Prøv igjen.";
                console.error(error);
            }
        }

        function nullstillOgHent() {
            sekunderIgjen = oppdateringsFrekvensSekunder;
            document.getElementById("teller").innerText = sekunderIgjen;
            hentFlydata();
        }

        // Denne timeren vil fortsette å gå uansett om et API-kall skulle feile av og til
        setInterval(() => {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = oppdateringsFrekvensSekunder;
                hentFlydata();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        hentFlydata();
    </script>

</body>
</html>
