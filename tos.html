<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tromsø Lufthavn (TOS) - Live Flytider</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 28px; }
        h1 span { color: var(--accent); }

        .status-indicator {
            font-size: 14px;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        th, td { padding: 16px; text-align: left; }

        th {
            background-color: #111827;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tr { border-bottom: 1px solid #334155; }
        tr:last-child { border-bottom: none; }
        tr:hover td { background-color: #253348; }

        .time { font-weight: 700; color: #ffffff; font-size: 16px; }
        .flight-id {
            font-family: monospace;
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-main);
        }

        .status-ok { color: var(--success); font-weight: 500; }
        .status-delay { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tromsø Lufthavn <span>• Avganger</span></h1>
        <div id="laster" class="status-indicator">Kobler til Avinor...</div>
    </header>

    <table>
        <thead>
            <tr>
                <th>Tid</th>
                <th>Flynummer</th>
                <th>Selskap</th>
                <th>Destinasjon</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabell-body">
            </tbody>
    </table>
</div>

<script>
    async function fetchWithFallback(urls) {
        for (let url of urls) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.text();
            } catch (e) {
                console.warn("En proxy feilet, prøver neste...", e);
            }
        }
        throw new Error("Avinor-serveren er overbelastet (Timeout). Prøver igjen om litt...");
    }

    async function hentFlydata() {
        const lasterTekst = document.getElementById('laster');
        if (lasterTekst) lasterTekst.innerText = "Oppdaterer...";

        // Vi fjerner filteret og henter den ferdiggenererte live-feeden. Dette er Mye raskere for Avinors servere!
        const avinorUrl = "https://asrv.avinor.no/XmlFeed/v1.0?airport=TOS";
        
        // Vi setter opp to forskjellige proxyer. Hvis den første tidsavbryter (408), hopper koden automatisk til nr 2.
        const proxyUrls = [
            "https://corsproxy.io/?" + encodeURIComponent(avinorUrl),
            "https://api.allorigins.win/raw?url=" + encodeURIComponent(avinorUrl)
        ];

        try {
            const xmlTekst = await fetchWithFallback(proxyUrls);

            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlTekst, "application/xml");
            
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                throw new Error("Klarte ikke å tolke flydataene.");
            }
            
            const flights = xmlDoc.getElementsByTagName("flight");
            let html = "";
            let antallFly = 0;
            const na = new Date();

            for (let i = 0; i < flights.length; i++) {
                const flight = flights[i];
                
                // Kun avganger
                if (flight.getElementsByTagName("arr_dep")[0]?.textContent !== "D") continue;

                const tidRaw = flight.getElementsByTagName("schedule_time")[0]?.textContent;
                if (!tidRaw) continue;
                
                const flyTid = new Date(tidRaw);
                
                // Vi filtrerer lokalt i nettleseren i stedet! Viser fly som går fra 1 time siden til 6 timer frem i tid
                const tidsDiffTimer = (flyTid - na) / (1000 * 60 * 60);
                if (tidsDiffTimer < -1 || tidsDiffTimer > 6) continue;

                antallFly++;
                const tid = tidRaw.substring(11, 16); 
                const flynr = flight.getElementsByTagName("flight_id")[0]?.textContent || "-";
                const selskap = flight.getElementsByTagName("airline")[0]?.textContent || "-";
                const til = flight.getElementsByTagName("airport")[0]?.textContent || "-";
                
                const statusNode = flight.getElementsByTagName("status")[0];
                let statusTekst = "I rute";
                let statusKlasse = "status-ok";
                
                if (statusNode) {
                    const kode = statusNode.getAttribute("code");
                    if (code === "E") {
                        const nyTid = statusNode.getAttribute("time")?.substring(11, 16);
                        statusTekst = "Ny tid: " + nyTid;
                        statusKlasse = "status-delay";
                    } else if (code === "C") {
                        statusTekst = "Innstilt";
                        statusKlasse = "status-delay";
                    } else if (code === "D") {
                        const avreistTid = statusNode.getAttribute("time")?.substring(11, 16);
                        statusTekst = "Gått " + avreistTid;
                    }
                }

                html += `<tr>
                    <td class="time">${tid}</td>
                    <td><span class="flight-id">${flynr}</span></td>
                    <td>${selskap}</td>
                    <td><b>${til}</b></td>
                    <td class="${statusKlasse}">${statusTekst}</td>
                </tr>`;
            }

            if (antallFly === 0) {
                html = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Ingen planlagte flyvninger akkurat nå.</td></tr>`;
            }

            document.getElementById('tabell-body').innerHTML = html;
            if (lasterTekst) lasterTekst.innerText = "Sist oppdatert: " + new Date().toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit'});

        } catch (feil) {
            console.error(feil);
            if (lasterTekst) lasterTekst.innerText = feil.message;
        }
    }

    hentFlydata();
    // Siden dette er mer skånsomt for serveren, oppdaterer vi hvert 2. minutt
    setInterval(hentFlydata, 120000);
</script>

</body>
</html>
