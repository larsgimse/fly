<script>
    async function hentFlydata() {
        const lasterTekst = document.getElementById('laster');
        if (lasterTekst) lasterTekst.innerText = "Oppdaterer...";

        // Den nøyaktige URL-en du oppga
        const avinorUrl = "https://asrv.avinor.no/XmlFeed/v1.0?TimeFrom=1&TimeTo=6&airport=TOS";
        
        // Vi bruker corsproxy.io som fungerer perfekt fra GitHub Pages
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(avinorUrl);

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Kunne ikke hente data");
            
            const xmlTekst = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlTekst, "application/xml");
            
            const flights = xmlDoc.getElementsByTagName("flight");
            let html = "";

            for (let i = 0; i < flights.length; i++) {
                const flight = flights[i];
                
                // Henter kun avganger ('D'). Endre til 'A' for ankomster hvis ønskelig.
                if (flight.getElementsByTagName("arr_dep")[0]?.textContent !== "D") continue;

                const tidRaw = flight.getElementsByTagName("schedule_time")[0]?.textContent;
                const tid = tidRaw ? tidRaw.substring(11, 16) : "--:--"; 
                const flynr = flight.getElementsByTagName("flight_id")[0]?.textContent || "-";
                const selskap = flight.getElementsByTagName("airline")[0]?.textContent || "-";
                const til = flight.getElementsByTagName("airport")[0]?.textContent || "-";
                
                const statusNode = flight.getElementsByTagName("status")[0];
                let status = "I rute";
                let klasse = "status-ok";
                
                if (statusNode) {
                    const kode = statusNode.getAttribute("code");
                    if (code === "E") {
                        const nyTid = statusNode.getAttribute("time")?.substring(11, 16);
                        status = "Ny tid: " + nyTid;
                        klasse = "status-delay";
                    } else if (code === "C") {
                        status = "Innstilt";
                        klasse = "status-delay";
                    }
                }

                html += `<tr>
                    <td><b>${tid}</b></td>
                    <td>${flynr}</td>
                    <td>${selskap}</td>
                    <td>${til}</td>
                    <td class="${klasse}">${status}</td>
                </tr>`;
            }

            document.getElementById('tabell-body').innerHTML = html;
            if (lasterTekst) lasterTekst.innerText = "Sist oppdatert: " + new Date().toLocaleTimeString();

        } catch (feil) {
            console.error("Feil:", feil);
            if (lasterTekst) lasterTekst.innerText = "Feil ved oppdatering. Prøv igjen.";
        }
    }

    // Hent data med en gang siden lastes
    hentFlydata();
    
    // Oppdater hvert 2. minutt automatisk
    setInterval(hentFlydata, 120000);
</script>
