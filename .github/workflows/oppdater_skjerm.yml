name: Update Dashboard Image and HTML

on:
  schedule:
    - cron: '*/15 * * * *' # Kjører nå automatisk hvert 15. minutt
  workflow_dispatch: # Gjør at du kan starte den manuelt når som helst

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Sjekk ut kode
      uses: actions/checkout@v4

    - name: Sett opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer avhengigheter
      run: |
        python -m pip install --upgrade pip
        pip install Pillow requests FlightRadarAPI tzdata

    - name: Kjør skript med Tromsø-tid
      env:
        TZ: 'Europe/Oslo'
      run: python app.py

    - name: Commit og Push endringer tilbake til GitHub
      run: |
        git config --global user.name 'Github Action'
        git config --global user.email 'action@github.com'
        # Legger til time.html (og eventuelle bilder/andre filer skriptet ditt lager)
        git add time.html
        git commit -m "Auto-oppdatert dashboard (HTML og data)" || true
        git push
