name: Update Dashboard Image

on:
  schedule:
    - cron: '*/30 * * * *' # Kjører automatisk hvert 30. minutt
  workflow_dispatch: # Gjør at du kan starte den manuelt når du vil

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Sjekk ut kode
      uses: actions/checkout@v4

    - name: Sett opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer avhengigheter
      run: |
        pip install Pillow requests FlightRadarAPI

    - name: Kjør skript
      run: python app.py

    - name: Commit og Push bildet back til GitHub
      run: |
        git config --global user.name 'Github Action'
        git config --global user.email 'action@github.com'
        git add dashboard.png
        git commit -m "Auto-oppdatert dashboard bilde" || true
        git push
