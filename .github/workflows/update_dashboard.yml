name: Update Dashboard Image

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Sjekk ut kode
      uses: actions/checkout@v4

    - name: Sett opp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer avhengigheter
      run: |
        pip install Pillow requests FlightRadarAPI tzdata

    - name: Kjør skript med Tromsø-tid
      env:
        TZ: 'Europe/Oslo'
      run: python app.py

    - name: Commit og Push HTML-filen back til GitHub
      run: |
        git config --global user.name 'Github Action'
        git config --global user.email 'action@github.com'
        git add time.html
        git commit -m "Auto-oppdatert dashboard HTML (time.html)" || true
        git push
