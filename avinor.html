<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinor Landingstest (Lynrask)</title>
    <style>
        body { font-family: monospace; background: #fff; color: #000; padding: 20px; }
        h2 { border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #000; padding: 8px; text-align: left; }
        th { font-weight: bold; }
        .status { font-style: italic; color: #666; }
    </style>
</head>
<body>

    <h1>AVINOR LANDINGSTEST (GITHUB ACTIONS)</h1>
    <p>Data oppdateres automatisk i bakgrunnen via GitHub roboten og lastes uten proxy!</p>

    <h2>GARDERMOEN (OSL)</h2>
    <div id="statusOsl" class="status">Henter data...</div>
    <table id="tabellOsl" style="display:none;">
        <thead>
            <tr>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Landet for</th>
                <th>Gate</th>
            </tr>
        </thead>
        <tbody id="dataOsl"></tbody>
    </table>

    <h2>TROMSØ (TOS)</h2>
    <div id="statusTos" class="status">Henter data...</div>
    <table id="tabellTos" style="display:none;">
        <thead>
            <tr>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Landet for</th>
                <th>Gate</th>
            </tr>
        </thead>
        <tbody id="dataTos"></tbody>
    </table>

    <script>
        function hentAvinorData(flyplassId) {
            var statusEl = document.getElementById("status" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var tabellEl = document.getElementById("tabell" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var dataEl = document.getElementById("data" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));

            var xhr = new XMLHttpRequest();
            
            // Finner den absolutte banen til der avinor.html kjører fra på GitHub Pages, og ser etter osl.xml / tos.xml der
            var gjeldendeSti = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + "/";
            xhr.open("GET", gjeldendeSti + flyplassId + ".xml?_cb=" + new Date().getTime(), true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var xmlDoc = xhr.responseXML;
                            if (!xmlDoc) {
                                var parser = new DOMParser();
                                xmlDoc = parser.parseFromString(xhr.responseText, "text/xml");
                            }
                            
                            var flights = xmlDoc.getElementsByTagName("flight");
                            var nåTid = new Date().getTime();
                            var htmlInnhold = "";
                            var antallLandet = 0;

                            for (var i = 0; i < flights.length; i++) {
                                var statusXml = flights[i].getElementsByTagName("status")[0];
                                
                                if (statusXml && statusXml.getAttribute("code") === "A") {
                                    var actualTimeStr = flights[i].getElementsByTagName("actualTime")[0];
                                    if (actualTimeStr) {
                                        var landetTid = new Date(actualTimeStr.textContent || actualTimeStr.innerText).getTime();
                                        var diffMinutter = (nåTid - landetTid) / 1000 / 60;

                                        // Vis fly som har landet de siste 15 minuttene
                                        if (diffMinutter >= 0 && diffMinutter <= 15) {
                                            antallLandet++;
                                            var rute = flights[i].getElementsByTagName("flight_id")[0]?.textContent || "Ukjent";
                                            var fra = flights[i].getElementsByTagName("airport")[0]?.textContent || "???";
                                            var gate = flights[i].getElementsByTagName("gate")[0]?.textContent || "-";
                                            var tidTekst = Math.floor(diffMinutter) + "m siden";

                                            htmlInnhold += "<tr>" +
                                                           "<td><strong>" + rute + "</strong></td>" +
                                                           "<td>" + fra + "</td>" +
                                                           "<td>" + tidTekst + "</td>" +
                                                           "<td>" + gate + "</td>" +
                                                           "</tr>";
                                        }
                                    }
                                }
                            }

                            if (antallLandet > 0) {
                                dataEl.innerHTML = htmlInnhold;
                                statusEl.style.display = "none";
                                tabellEl.style.display = "table";
                            } else {
                                statusEl.innerText = "Ingen fly har landet de siste 15 minuttene.";
                                tabellEl.style.display = "none";
                            }

                        } catch (e) {
                            statusEl.innerText = "Feil ved lesing av mottatt data.";
                        }
                    } else {
                        statusEl.innerText = "Venter på første automatiske bakgrunnshenting... (XML-fil ikke generert ennå)";
                    }
                }
            };
            xhr.send();
        }

        // Kjør ved oppstart
        hentAvinorData("osl");
        hentAvinorData("tos");
        
        // Oppdater automatisk hvert 30. sekund
        setInterval(function() {
            hentAvinorData("osl");
            hentAvinorData("tos");
        }, 30000);
    </script>
</body>
</html>
