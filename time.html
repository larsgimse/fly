<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nook Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            width: 600px;
            height: 800px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .top-section {
            text-align: center;
            margin-top: 20px;
        }
        
        .clock {
            font-size: 110px;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        
        .date {
            font-size: 22px;
            font-weight: 400;
            color: #555555;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        
        .divider {
            border-top: 1px solid #e0e0e0;
            width: 85%;
            margin: 40px auto;
        }
        
        .bottom-section {
            display: flex;
            flex: 1;
            padding: 0 20px;
        }
        
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .left-column {
            padding-right: 20px;
            border-right: 1px solid #e0e0e0;
        }
        
        .right-column {
            padding-left: 30px;
        }
        
        .label-top {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
        }
        
        .label-sub {
            font-size: 14px;
            font-weight: 400;
            color: #777777;
            margin: 0 0 35px 0;
            letter-spacing: 1px;
        }
        
        .huge-data {
            font-size: 75px;
            font-weight: 700;
            margin: 0 0 25px 0;
            line-height: 1;
        }
        
        .detail-text {
            font-size: 18px;
            font-weight: 400;
            margin: 8px 0;
            color: #222222;
        }
    </style>
    <meta http-equiv="refresh" content="60">
</head>
<body>

    <div class="top-section">
        <h1 class="clock">00:04</h1>
        <div class="date">TUESDAY, JUNE 30</div>
    </div>
    
    <div class="divider"></div>
    
    <div class="bottom-section">
        <div class="column left-column">
            <h2 class="label-top">TROMSØ</h2>
            <h3 class="label-sub">HEAVYRAIN</h3>
            <div class="huge-data">11°</div>
            <div class="detail-text">VIND: 1 m/s</div>
            <div class="detail-text">FUKTIGHET: 96%</div>
        </div>
        
        <div class="column right-column">
            <h2 class="label-top">NESTE ANKOMST</h2>
            <h3 class="label-sub">TOS / ENTC</h3>
            <div class="huge-data">--:--</div>
            <div class="detail-text">FLIGHT: INGEN FLY</div>
            <div class="detail-text">FRA: -</div>
        </div>
    </div>

</body>
</html>
