<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly over Gardermoen</title>
    <style>
        /* E-ink optimalisert stil: Kun sort/hvitt og høy kontrast */
        body {
            font-family: monospace, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 10px;
            margin: 0;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }
        .meta {
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border-bottom: 1px solid #000000;
            text-align: left;
            padding: 6px 4px;
            font-size: 0.9rem;
        }
        th {
            font-weight: bold;
        }
        .loading {
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>FLY OVER GARDERMOEN</h1>
    <div class="meta">
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske oppdatering om: <span id="teller">30</span>s
    </div>

    <button onclick="nullstillOgHent()">OPPDATER NÅ</button>

    <div id="status" class="loading">Henter data fra Flightradar24...</div>
    
    <table id="flyTabell" style="display: none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Høyde (fot)</th>
                <th>Fart (knop)</th>
            </tr>
        </thead>
        <tbody id="flyData">
            </tbody>
    </table>

    <script>
        // NÅ MED CORS-PROXY: Tvinger dataene gjennom en nøytral tjener så nettleseren godtar det
        const url = "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=60.30,60.10,10.90,11.30%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=1%26air=1%26vehicles=1%26estimated=1";
        
        const oppdateringsFrekvensSekunder = 30;
        let sekunderIgjen = oppdateringsFrekvensSekunder;

        async function hentFlydata() {
            const statusEl = document.getElementById("status");
            const tabellEl = document.getElementById("flyTabell");
            const dataBoks = document.getElementById("flyData");
            const tidsEl = document.getElementById("time");

            statusEl.style.display = "block";
            statusEl.innerText = "Henter ferske data...";
            tabellEl.style.display = "none";
            dataBoks.innerHTML = "";

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const nå = new Date();
                tidsEl.innerText = nå.toLocaleTimeString("no-NO");

                // Filtrer bort metadata fra Flightradar24
                const flyNøkler = Object.keys(data).filter(key => key !== "full_count" && key !== "version" && key !== "stats");

                if (flyNøkler.length === 0) {
                    statusEl.innerText = "Ingen fly registrert rundt Gardermoen akkurat nå.";
                    tabellEl.style.display = "none";
                    return;
                }

                statusEl.style.display = "none";
                tabellEl.style.display = "table";

                flyNøkler.forEach(nøkkel => {
                    const flyinfo = data[nøkkel];
                    
                    const rute = flyinfo[13] && flyinfo[13] !== "" ? flyinfo[13] : (flyinfo[16] ? flyinfo[16] : "Ukjent");
                    const fra = flyinfo[11] || "???";
                    const til = flyinfo[12] || "???";
                    const høyde = flyinfo[4] === 0 ? "Bakken" : flyinfo[4] + " ft";
                    const fart = flyinfo[5] + " kt";

                    const rad = document.createElement("tr");
                    rad.innerHTML = `
                        <td><strong>${rute}</strong></td>
                        <td>${fra} -> ${til}</td>
                        <td>${høyde}</td>
                        <td>${fart}</td>
                    `;
                    dataBoks.appendChild(rad);
                });

            } catch (error) {
                statusEl.innerText = "Kunne ikke hente data. Prøv igjen.";
                console.error(error);
            }
        }

        function nullstillOgHent() {
            sekunderIgjen = oppdateringsFrekvensSekunder;
            document.getElementById("teller").innerText = sekunderIgjen;
            hentFlydata();
        }

        setInterval(() => {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = oppdateringsFrekvensSekunder;
                hentFlydata();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        hentFlydata();
    </script>

</body>
</html>
