<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyradar (Nook Kompatibel)</title>
    <style>
        /* E-ink optimalisert stil: Kun sort/hvitt og høy kontrast */
        body {
            font-family: monospace, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 10px;
            margin: 0;
        }
        h2 {
            margin-bottom: 5px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
            font-size: 1.2rem;
            margin-top: 15px;
        }
        .meta {
            font-size: 0.8rem;
            margin-top: 25px;
            border-top: 1px dashed #000000;
            padding-top: 10px;
            line-height: 1.4;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%; /* Gjør knappen lett å treffe på e-ink */
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        th, td {
            border-bottom: 1px solid #000000;
            text-align: left;
            padding: 6px 4px;
            font-size: 0.9rem;
        }
        th {
            font-weight: bold;
        }
        .loading {
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <button onclick="nullstillOgHent()">OPPDATER NÅ</button>

    <h2>GARDERMOEN</h2>
    <div id="statusOsl" class="loading">Henter ferske data...</div>
    <table id="tabellOsl" style="display: none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Høyde/Fart</th>
                <th>Retn. / Avstand</th>
                <th>Status / Gate</th>
            </tr>
        </thead>
        <tbody id="dataOsl"></tbody>
    </table>

    <h2>TROMSØ</h2>
    <div id="statusTos" class="loading">Henter ferske data...</div>
    <table id="tabellTos" style="display: none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Høyde/Fart</th>
                <th>Retn. / Avstand</th>
                <th>Status / Gate</th>
            </tr>
        </thead>
        <tbody id="dataTos"></tbody>
    </table>

    <div class="meta">
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske oppdatering om: <span id="teller">30</span>s
    </div>

    <script>
        // Koordinater og API-bokser for flyplassene
        var flyplasser = {
            osl: {
                kode: "OSL",
                lat: 60.197,
                lon: 11.096,
                url: "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=60.480,59.910,10.510,11.680%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=0%26air=1%26vehicles=0%26estimated=1",
                avinorUrl: "https://corsproxy.io/?https://data-cloud.avinor.no/flightdata/v1/airport/OSL/arrivals",
                statusElId: "statusOsl",
                tabellElId: "tabellOsl",
                dataElId: "dataOsl"
            },
            tos: {
                kode: "TOS",
                lat: 69.683,
                lon: 18.919,
                url: "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=69.960,69.400,18.150,19.680%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=0%26air=1%26vehicles=0%26estimated=1",
                avinorUrl: "https://corsproxy.io/?https://data-cloud.avinor.no/flightdata/v1/airport/TOS/arrivals",
                statusElId: "statusTos",
                tabellElId: "tabellTos",
                dataElId: "dataTos"
            }
        };
                
        var oppdateringsFrekvensSekunder = 30;
        var sekunderIgjen = oppdateringsFrekvensSekunder;

        function kalkulerAvstand(lat1, lon1, lat2, lon2) {
            var x = (lon2 - lon1) * Math.cos((lat1 + lat2) / 2 * Math.PI / 180) * 111.32;
            var y = (lat2 - lat1) * 111.13;
            return Math.sqrt(x * x + y * y);
        }

        function hentRetningsPil(grader) {
            if (grader === undefined || grader === null) return "?";
            var g = grader % 360;
            if (g >= 337.5 || g < 22.5)  return "&#8593;";  // N (↑)
            if (g >= 22.5  && g < 67.5)  return "&#8599;";  // NØ (↗)
            if (g >= 67.5  && g < 112.5) return "&#8594;";  // Ø (→)
            if (g >= 112.5 && g < 157.5) return "&#8600;";  // SØ (↘)
            if (g >= 157.5 && g < 202.5) return "&#8595;";  // S (↓)
            if (g >= 202.5 && g < 247.5) return "&#8601;";  // SV (↙)
            if (g >= 247.5 && g < 292.5) return "&#8592;";  // V (←)
            if (g >= 292.5 && g < 337.5) return "&#8598;";  // NV (↖)
            return "?";
        }

        // Hjelpefunksjon for å lagre landede fly i localStorage
        function lagreLandetFly(id, rute, fra, til, gate) {
            var nå = new Date().getTime();
            var lagredeFly = JSON.parse(localStorage.getItem("landedeFly_" + id)) || [];
            
            // Sjekk om flyet allerede er lagret
            var eksisterer = lagredeFly.some(function(f) { return f.rute === rute; });
            if (!eksisterer && rute !== "Ukjent") {
                lagredeFly.push({
                    rute: rute,
                    fra: fra,
                    til: til,
                    gate: gate || "-",
                    landetTid: nå
                });
                localStorage.setItem("landedeFly_" + id, JSON.stringify(lagredeFly));
            }
        }

        // Henter ut rensede og oppdaterte landede fly som er under 3 minutter gamle
        function hentAktiveLandedeFly(id) {
            var nå = new Date().getTime();
            var lagredeFly = JSON.parse(localStorage.getItem("landedeFly_" + id)) || [];
            
            // Filtrer ut fly som landet for mer enn 3 minutter (180 000 ms) siden
            var gyldigeFly = lagredeFly.filter(function(f) {
                return (nå - f.landetTid) < 180000;
            });
            
            localStorage.setItem("landedeFly_" + id, JSON.stringify(gyldigeFly));
            return gyldigeFly;
        }

        function hentDataForFlyplass(id) {
            var fp = flyplasser[id];
            var statusEl = document.getElementById(fp.statusElId);
            var tabellEl = document.getElementById(fp.tabellElId);
            var dataBoks = document.getElementById(fp.dataElId);

            statusEl.style.display = "block";
            statusEl.innerText = "Henter ferske data...";
            tabellEl.style.display = "none";
            dataBoks.innerHTML = "";

            // Hent Avinor-data først
            var avinorXhr = new XMLHttpRequest();
            avinorXhr.open("GET", fp.avinorUrl, true);
            avinorXhr.onreadystatechange = function() {
                if (avinorXhr.readyState === 4) {
                    var avinorData = {};
                    if (avinorXhr.status === 200 && avinorXhr.responseXML) {
                        var flights = avinorXhr.responseXML.getElementsByTagName("flight");
                        for (var i = 0; i < flights.length; i++) {
                            var fId = flights[i].getElementsByTagName("flight_id")[0];
                            if (fId) {
                                var ruteNavn = fId.textContent || fId.innerText;
                                var gateEl = flights[i].getElementsByTagName("gate")[0];
                                var statusElXml = flights[i].getElementsByTagName("status")[0];
                                
                                avinorData[ruteNavn.replace(/\s+/g, '')] = {
                                    gate: gateEl ? (gateEl.textContent || gateEl.innerText) : "-",
                                    statusKode: statusElXml ? statusElXml.getAttribute("code") : ""
                                };
                            }
                        }
                    }
                    // Gå videre til å hente Flightradar-data når Avinor er ferdig
                    hentFlightradarData(id, avinorData);
                }
            };
            avinorXhr.send();
        }

        function hentFlightradarData(id, avinorData) {
            var fp = flyplasser[id];
            var statusEl = document.getElementById(fp.statusElId);
            var tabellEl = document.getElementById(fp.tabellElId);
            var dataBoks = document.getElementById(fp.dataElId);

            var xhr = new XMLHttpRequest();
            var uniktTidsstempel = new Date().getTime();
            var urlMedCacheBuster = fp.url + "%26_=" + uniktTidsstempel;

            xhr.open("GET", urlMedCacheBuster, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            var flyListe = [];

                            for (var nøkkel in data) {
                                if (data.hasOwnProperty(nøkkel) && nøkkel !== "full_count" && nøkkel !== "version" && nøkkel !== "stats") {
                                    var flyinfo = data[nøkkel];
                                    
                                    var flyLat = flyinfo[1];
                                    var flyLon = flyinfo[2];
                                    var heading = flyinfo[3];
                                    var altitude = flyinfo[4];
                                    var flytype = flyinfo[8] || "Ukjent";
                                    var regNummer = flyinfo[9] || "Mangler reg.";
                                    var påBakken = flyinfo[14] === 1;
                                    var ruteId = flyinfo[13] && flyinfo[13] !== "" ? flyinfo[13] : (flyinfo[16] ? flyinfo[16] : "Ukjent");
                                    var renRuteId = ruteId.replace(/\s+/g, '');

                                    var avstandKm = kalkulerAvstand(fp.lat, fp.lon, flyLat, flyLon);

                                    // Sjekk om flyet har landet via radar-data eller om Avinor sier det har ankommet ('A')
                                    var avinorInfo = avinorData[renRuteId] || { gate: "-", statusKode: "" };
                                    if (altitude <= 0 || påBakken || avinorInfo.statusKode === "A") {
                                        if (avstandKm <= 5.0) { // Kun lagre fly som faktisk er helt nære flyplassen
                                            lagreLandetFly(id, ruteId, flyinfo[11] || "???", flyinfo[12] || "???", avinorInfo.gate);
                                        }
                                        continue; 
                                    }
                                        
                                    if (avstandKm > 30.0) {
                                        continue;
                                    }

                                    flyListe.push({
                                        rute: ruteId,
                                        type: flytype,
                                        reg: regNummer,
                                        fra: flyinfo[11] || "???",
                                        til: flyinfo[12] || "???",
                                        høyde: altitude + " ft",
                                        fart: flyinfo[5] + " kt",
                                        retning: heading,
                                        avstand: avstandKm,
                                        gate: avinorInfo.gate,
                                        statusText: "I lufta"
                                    });
                                }
                            }

                            // Hent nylig landede fly fra minnet og legg dem til i listen
                            var landedeFlyIMinnet = hentAktiveLandedeFly(id);
                            for (var k = 0; k < landedeFlyIMinnet.length; k++) {
                                var lf = landedeFlyIMinnet[k];
                                flyListe.push({
                                    rute: lf.rute,
                                    type: "Landet fly",
                                    reg: "-",
                                    fra: lf.fra,
                                    til: lf.til,
                                    høyde: "0 ft",
                                    fart: "0 kt",
                                    retning: null,
                                    avstand: 0,
                                    gate: lf.gate,
                                    statusText: "LANDET"
                                });
                            }

                            if (flyListe.length === 0) {
                                statusEl.innerText = "Ingen fly i lufta eller nylig landet innenfor 30 km.";
                                tabellEl.style.display = "none";
                                return;
                            }

                            // Sorter slik at fly i lufta (nærmest) kommer først, men landede fly holdes samlet
                            flyListe.sort(function (a, b) {
                                if (a.statusText === "LANDET" && b.statusText !== "LANDET") return 1;
                                if (a.statusText !== "LANDET" && b.statusText === "LANDET") return -1;
                                return a.avstand - b.avstand;
                            });
                            
                            var maksSyvFly = flyListe.slice(0, 7);

                            statusEl.style.display = "none";
                            tabellEl.style.display = "table";
                            
                            for (var i = 0; i < maksSyvFly.length; i++) {
                                var fly = maksSyvFly[i];
                                var rad = document.createElement("tr");
                                
                                if (fly.statusText === "LANDET") {
                                    // Stil for landede fly
                                    rad.innerHTML = "<td><strong>" + fly.rute + "</strong><br><small style='color:#555;'>Nylig landet</small></td>" +
                                                    "<td>" + fly.fra + " -> " + fly.til + "</td>" +
                                                    "<td>-</td>" +
                                                    "<td>Bakken</td>" +
                                                    "<td><strong style='border:1px solid #000; padding:1px 3px;'>LANDET</strong><br>Gate: " + fly.gate + "</td>";
                                } else {
                                    // Vanlig radar-rad for fly i lufta
                                    var pil = hentRetningsPil(fly.retning);
                                    rad.innerHTML = "<td><strong>" + fly.rute + "</strong><br><small>" + fly.type + " (" + fly.reg + ")</small></td>" +
                                                    "<td>" + fly.fra + " -> " + fly.til + "</td>" +
                                                    "<td>" + fly.høyde + "<br>" + fly.fart + "</td>" +
                                                    "<td><span style='font-size:1.2rem; font-weight:bold;'>" + pil + "</span> " + fly.avstand.toFixed(1) + " km</td>" +
                                                    "<td>Gate: " + fly.gate + "</td>";
                                }
                                dataBoks.appendChild(rad);
                            }

                        } catch (e) {
                            statusEl.innerText = "Feil ved tolking av data.";
                            console.error(e);
                        }
                    } else {
                        statusEl.innerText = "Kunne ikke kontakte server (Status: " + xhr.status + ")";
                    }
                }
            };
            xhr.send();
        }

        function oppdaterAlleFlyplasser() {
            var nå = new Date();
            document.getElementById("time").innerText = nå.toLocaleTimeString("no-NO");
            hentDataForFlyplass("osl");
            hentDataForFlyplass("tos");
        }

        function nullstillOgHent() {
            sekunderIgjen = oppdateringsFrekvensSekunder;
            document.getElementById("teller").innerText = sekunderIgjen;
            oppdaterAlleFlyplasser();
        }

        setInterval(function () {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = oppdateringsFrekvensSekunder;
                oppdaterAlleFlyplasser();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        oppdaterAlleFlyplasser();
    </script>
</body>
</html>
