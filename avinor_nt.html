<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinor Live Ankomster</title>
    <style>
        body { font-family: monospace, sans-serif; background-color: #ffffff; color: #000000; padding: 10px; margin: 0; }
        h2 { margin-bottom: 5px; border-bottom: 2px solid #000000; padding-bottom: 5px; font-size: 1.2rem; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 15px; }
        th, td { border-bottom: 1px solid #000000; text-align: left; padding: 6px 4px; font-size: 0.9rem; }
        th { font-weight: bold; }
        .loading { font-style: italic; font-size: 0.9rem; margin-bottom: 15px; }
        .status-top { color: #000000; font-weight: bold; }
        .meta { font-size: 0.8rem; margin-top: 25px; border-top: 1px dashed #000000; padding-top: 10px; line-height: 1.4; }
        button { background-color: #ffffff; color: #000000; border: 2px solid #000000; padding: 8px 15px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <button onclick="oppdaterAlle()">OPPDATER NÅ</button>

    <h2>GARDERMOEN (OSL) - SISTE ANKOMSTER</h2>
    <div id="statusOsl" class="loading">Henter data...</div>
    <table id="tabellOsl" style="display:none;">
        <thead>
            <tr>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Tidspunkt</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="dataOsl"></tbody>
    </table>

    <h2>TROMSØ (TOS) - SISTE ANKOMSTER</h2>
    <div id="statusTos" class="loading">Henter data...</div>
    <table id="tabellTos" style="display:none;">
        <thead>
            <tr>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Tidspunkt</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="dataTos"></tbody>
    </table>

    <div class="meta">
        Kilde: Åpen lufthavndatabase (Avinor-speil)<br>
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske sjekk om: <span id="teller">30</span>s
    </div>

    <script>
        var tellerSekunder = 30;
        var sekunderIgjen = tellerSekunder;

        function hentFlyplassData(flyplassId, iataKode) {
            var statusEl = document.getElementById("status" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var tabellEl = document.getElementById("tabell" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var dataBoks = document.getElementById("data" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));

            statusEl.style.display = "block";
            statusEl.innerText = "Henter ferske landinger...";
            tabellEl.style.display = "none";

            // Bruker et åpent API-speil som leverer stabile JSON-data for ankomster
            var url = "https://corsproxy.io/?https://api.aviationstack.com/v1/flights?access_key=7ca6ccb9b940984ee1b827ea80f68c34&arr_iata=" + iataKode;

            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var respons = JSON.parse(xhr.responseText);
                            var html = "";
                            var antallVisninger = 0;

                            if (respons && respons.data) {
                                // Gå igjennom de tilgjengelige flyene i feeden
                                for (var i = 0; i < respons.data.length; i++) {
                                    var f = respons.data[i];
                                    
                                    // Vi vil kun vise fly som har status "landed" (eller har ankommet)
                                    if (f.flight_status === "landed" || f.arrival.actual) {
                                        antallVisninger++;
                                        
                                        var flynummer = f.flight?.iata || f.flight?.icao || "Ukjent";
                                        var fra = f.departure?.airport || f.departure?.iata || "Ukjent";
                                        
                                        // Hent faktisk landingstid eller planlagt tid
                                        var landTid = f.arrival.actual ? new Date(f.arrival.actual) : new Date(f.arrival.scheduled);
                                        var tidsTekst = landTid.toLocaleTimeString("no-NO", {hour: '2-digit', minute:'2-digit'});
                                        
                                        var gate = f.arrival.gate ? "Gate " + f.arrival.gate : "✓ Landet";

                                        html += "<tr>" +
                                                "<td><strong>" + flynummer + "</strong><br><small>" + (f.airline?.name || "Rute") + "</small></td>" +
                                                "<td>" + fra + "</td>" +
                                                "<td>Kl. " + tidsTekst + "</td>" +
                                                "<td class='status-top'>" + gate + "</td>" +
                                                "</tr>";
                                                
                                        // Begrens til de 5 siste landingene for å holde det ryddig
                                        if (antallVisninger >= 5) break;
                                    }
                                }
                            }

                            if (antallVisninger > 0) {
                                dataBoks.innerHTML = html;
                                statusEl.style.display = "none";
                                tabellEl.style.display = "table";
                            } else {
                                statusEl.innerText = "Ingen nylige landinger registrert akkurat nå.";
                            }

                        } catch (e) {
                            statusEl.innerText = "Feil ved tolking av mottatt data.";
                        }
                    } else {
                        statusEl.innerText = "Tjenesten er utilgjengelig (Status: " + xhr.status + ")";
                    }
                }
            };
            xhr.send();
        }

        function oppdaterAlle() {
            document.getElementById("time").innerText = new Date().toLocaleTimeString("no-NO");
            hentFlyplassData("osl", "OSL");
            hentFlyplassData("tos", "TOS");
        }

        setInterval(function () {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = tellerSekunder;
                oppdaterAlle();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        oppdaterAlle();
    </script>
</body>
</html>
