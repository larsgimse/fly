<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinor Live Ankomster</title>
    <style>
        body { font-family: monospace, sans-serif; background-color: #ffffff; color: #000000; padding: 10px; margin: 0; }
        h2 { margin-bottom: 5px; border-bottom: 2px solid #000000; padding-bottom: 5px; font-size: 1.2rem; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 15px; }
        th, td { border-bottom: 1px solid #000000; text-align: left; padding: 6px 4px; font-size: 0.9rem; }
        th { font-weight: bold; }
        .loading { font-style: italic; font-size: 0.9rem; margin-bottom: 15px; }
        .status-top { color: #000000; font-weight: bold; }
        .meta { font-size: 0.8rem; margin-top: 25px; border-top: 1px dashed #000000; padding-top: 10px; line-height: 1.4; }
        button { background-color: #ffffff; color: #000000; border: 2px solid #000000; padding: 8px 15px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <button onclick="oppdaterAlle()">OPPDATER NÅ</button>

    <h2>GARDERMOEN (OSL) - SISTE ANKOMSTER</h2>
    <div id="statusOsl" class="loading">Henter data...</div>
    <table id="tabellOsl" style="display:none;">
        <thead>
            <tr>
                <th>Tid</th>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Status / Gate</th>
            </tr>
        </thead>
        <tbody id="dataOsl"></tbody>
    </table>

    <h2>TROMSØ (TOS) - SISTE ANKOMSTER</h2>
    <div id="statusTos" class="loading">Henter data...</div>
    <table id="tabellTos" style="display:none;">
        <thead>
            <tr>
                <th>Tid</th>
                <th>Flynummer</th>
                <th>Kommer fra</th>
                <th>Status / Gate</th>
            </tr>
        </thead>
        <tbody id="dataTos"></tbody>
    </table>

    <div class="meta">
        Kilde: Avinor Teledata Live (Åpen kilde)<br>
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske sjekk om: <span id="teller">30</span>s
    </div>

    <script>
        var tellerSekunder = 30;
        var sekunderIgjen = tellerSekunder;

        function hentAvinorTekst(flyplassId, kode) {
            var statusEl = document.getElementById("status" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var tabellEl = document.getElementById("tabell" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));
            var dataBoks = document.getElementById("data" + flyplassId.charAt(0).toUpperCase() + flyplassId.slice(1));

            statusEl.style.display = "block";
            statusEl.innerText = "Henter offisielle flytider...";
            tabellEl.style.display = "none";

            // Vi henter Avinor sin offisielle og helt åpne tekst-feed via corsproxy.io
            var url = "https://corsproxy.io/?https://flydata.avinor.no/Teledata?lufthavn=" + kode + "&retning=A";

            var xhr = new XMLHttpRequest();
            xhr.open("GET", url + "&_cb=" + new Date().getTime(), true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var tekstData = xhr.responseText;
                            var linjer = tekstData.split("\n");
                            var html = "";
                            var antallVisninger = 0;

                            // Loop igjennom tekstlinjene (vi hopper over den første overskriftslinjen)
                            for (var i = 1; i < linjer.length; i++) {
                                var linje = linjer[i].trim();
                                if (linje === "") continue;

                                // Avinor deler dataene med semikolon (;). Superenkelt å splitte!
                                var felt = linje.split(";");
                                
                                if (felt.length >= 7) {
                                    var planlagtTid = felt[0] ? felt[0].substring(11, 16) : "--:--";
                                    var flynummer = felt[1] || "Ukjent";
                                    var fra Flyplass = felt[2] || "???";
                                    var statusTekst = felt[5] || "";
                                    var gate = felt[6] || "";

                                    // Vi vil gjerne vise fly som enten har landet ("Landed" / "Ankommet") eller er like rundt hjørnet
                                    if (statusTekst.toLowerCase().indexOf("land") !== -1 || statusText.toLowerCase().indexOf("ank") !== -1 || statusTekst === "") {
                                        antallVisninger++;
                                        
                                        var statusVisning = gate !== "" ? "Gate " + gate : (statusTekst || "✓ Landet");

                                        html += "<tr>" +
                                                "<td><strong>Kl. " + planlagtTid + "</strong></td>" +
                                                "<td>" + flynummer + "</td>" +
                                                "<td>" + fraFlyplass + "</td>" +
                                                "<td class='status-top'>" + statusVisning + "</td>" +
                                                "</tr>";
                                                
                                        // Vis de 6 nyeste/neste flyene
                                        if (antallVisninger >= 6) break;
                                    }
                                }
                            }

                            if (antallVisninger > 0) {
                                dataBoks.innerHTML = html;
                                statusEl.style.display = "none";
                                tabellEl.style.display = "table";
                            } else {
                                statusEl.innerText = "Ingen nylige ankomster registrert i Avinor-feeden.";
                            }

                        } catch (e) {
                            statusEl.innerText = "Feil under lesing av tekstfeed.";
                        }
                    } else {
                        statusEl.innerText = "Avinor-feeden er midlertidig utilgjengelig (Status: " + xhr.status + ")";
                    }
                }
            };
            xhr.send();
        }

        function oppdaterAlle() {
            document.getElementById("time").innerText = new Date().toLocaleTimeString("no-NO");
            hentAvinorTekst("osl", "OSL");
            hentAvinorTekst("tos", "TOS");
        }

        setInterval(function () {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = tellerSekunder;
                oppdaterAlle();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        oppdaterAlle();
    </script>
</body>
</html>
