<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardermoen (Nook Kompatibel)</title>
    <style>
        /* E-ink optimalisert stil: Kun sort/hvitt og høy kontrast */
        body {
            font-family: monospace, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 10px;
            margin: 0;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }
        .meta {
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border-bottom: 1px solid #000000;
            text-align: left;
            padding: 6px 4px;
            font-size: 0.9rem;
        }
        th {
            font-weight: bold;
        }
        .loading {
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>GARDERMOEN (KUN I LUFTA)</h1>
    <div class="meta">
        Sist oppdatert: <span id="time">-</span><br>
        Neste automatiske oppdatering om: <span id="teller">30</span>s
    </div>

    <button onclick="nullstillOgHent()">OPPDATER NÅ</button>

    <div id="status" class="loading">Henter ferske data...</div>
        
    <table id="flyTabell" style="display: none;">
        <thead>
            <tr>
                <th>Fly / Rute</th>
                <th>Fra -> Til</th>
                <th>Høyde/Fart</th>
                <th>Avstand</th>
            </tr>
        </thead>
        <tbody id="flyData">
        </tbody>
    </table>

    <script>
        // Sentrumskoordinater for Gardermoen terminal
        var mittPunktLat = 60.197;
        var mittPunktLon = 11.096;

        var baseUrl = "https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=60.287,60.107,10.916,11.276%26faa=1%26flight_states=1%26satellite=1%26mlat=1%26flarm=1%26adsb=1%26gnd=0%26air=1%26vehicles=0%26estimated=1";
                
        var oppdateringsFrekvensSekunder = 30;
        var sekunderIgjen = oppdateringsFrekvensSekunder;

        function kalkulerAvstand(lat1, lon1, lat2, lon2) {
            var x = (lon2 - lon1) * Math.cos((lat1 + lat2) / 2 * Math.PI / 180) * 111.32;
            var y = (lat2 - lat1) * 111.13;
            return Math.sqrt(x * x + y * y);
        }

        function hentFlydata() {
            var statusEl = document.getElementById("status");
            var tabellEl = document.getElementById("flyTabell");
            var dataBoks = document.getElementById("flyData");
            var tidsEl = document.getElementById("time");

            statusEl.style.display = "block";
            statusEl.innerText = "Henter ferske data...";
            tabellEl.style.display = "none";
            dataBoks.innerHTML = "";

            // Bruker XMLHttpRequest i stedet for fetch for maksimal Nook-kompatibilitet
            var xhr = new XMLHttpRequest();
            var uniktTidsstempel = new Date().getTime();
            var urlMedCacheBuster = baseUrl + "%26_=" + uniktTidsstempel;

            xhr.open("GET", urlMedCacheBuster, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            
                            var nå = new Date();
                            tidsEl.innerText = nå.toLocaleTimeString("no-NO");

                            // Manuelt filtrere nøkler (siden .filter() og Object.keys() kan feile på veldig gamle enheter)
                            var flyListe = [];
                            for (var nøkkel in data) {
                                if (data.hasOwnProperty(nøkkel) && nøkkel !== "full_count" && nøkkel !== "version" && nøkkel !== "stats") {
                                    var flyinfo = data[nøkkel];
                                    
                                    var flyLat = flyinfo[1];
                                    var flyLon = flyinfo[2];
                                    var altitude = flyinfo[4];
                                    var påBakken = flyinfo[14] === 1;

                                    if (altitude <= 0 || påBakken) {
                                        continue; 
                                    }
                                                        
                                    var avstandKm = kalkulerAvstand(mittPunktLat, mittPunktLon, flyLat, flyLon);

                                    flyListe.push({
                                        rute: flyinfo[13] && flyinfo[13] !== "" ? flyinfo[13] : (flyinfo[16] ? flyinfo[16] : "Ukjent"),
                                        fra: flyinfo[11] || "???",
                                        til: flyinfo[12] || "???",
                                        høyde: altitude + " ft",
                                        fart: flyinfo[5] + " kt",
                                        avstand: avstandKm
                                    });
                                }
                            }

                            if (flyListe.length === 0) {
                                statusEl.innerText = "Ingen fly i lufta innenfor 10 km akkurat nå.";
                                tabellEl.style.display = "none";
                                return;
                            }

                            // Sorter listen tradisjonelt
                            flyListe.sort(function (a, b) {
                                return b.avstand - a.avstand;
                            });
                            
                            statusEl.style.display = "none";
                            tabellEl.style.display = "table";
                            
                            for (var i = 0; i < flyListe.length; i++) {
                                var fly = flyListe[i];
                                var rad = document.createElement("tr");
                                rad.innerHTML = "<td><strong>" + fly.rute + "</strong></td>" +
                                                "<td>" + fly.fra + " -> " + fly.til + "</td>" +
                                                "<td>" + fly.høyde + "<br>" + fly.fart + "</td>" +
                                                "<td><strong>" + fly.avstand.toFixed(1) + " km</strong></td>";
                                dataBoks.appendChild(rad);
                            }

                        } catch (e) {
                            statusEl.innerText = "Feil ved tolking av data.";
                            console.error(e);
                        }
                    } else {
                        statusEl.innerText = "Kunne ikke kontakte server (Status: " + xhr.status + ")";
                    }
                }
            };
            
            xhr.send();
        }

        function nullstillOgHent() {
            sekunderIgjen = oppdateringsFrekvensSekunder;
            document.getElementById("teller").innerText = sekunderIgjen;
            hentFlydata();
        }

        setInterval(function () {
            sekunderIgjen--;
            if (sekunderIgjen <= 0) {
                sekunderIgjen = oppdateringsFrekvensSekunder;
                hentFlydata();
            }
            document.getElementById("teller").innerText = sekunderIgjen;
        }, 1000);

        hentFlydata();
    </script>
</body>
</html>
